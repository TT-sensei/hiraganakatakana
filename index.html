<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>かなマスター</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root { --primary:#FF6B9D; --secondary:#FF9DC6; --green:#00D084; --bg:#FFF5F9; }
body { font-family:'Hiragino Rounded Gothic Pro','ヒラギノ丸ゴ Pro','BIZ UDPGothic',sans-serif; background:var(--bg); min-height:100vh; color:#333; }
.screen { display:none; padding:16px; max-width:480px; margin:0 auto; }
.screen.active { display:block; }

.title-logo { text-align:center; padding:28px 0 8px; font-size:2.2rem; font-weight:900; color:var(--primary); }
.title-sub  { text-align:center; color:#aaa; font-size:.9rem; margin-bottom:20px; }
.lv-badge { display:flex; align-items:center; gap:10px; background:white; border-radius:20px; padding:8px 16px; margin:0 auto 16px; width:fit-content; box-shadow:0 2px 10px rgba(0,0,0,.08); }
.xp-wrap { background:#F0F0F0; border-radius:99px; height:7px; width:120px; overflow:hidden; margin-top:3px; }
.xp-bar  { height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); border-radius:99px; transition:width .4s; }
.sec-label { font-size:.75rem; font-weight:700; color:#aaa; margin:12px 0 6px 4px; }
.menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.btn-group { background:white; border:2px solid #E5E7EB; border-radius:14px; padding:14px 8px; cursor:pointer; text-align:center; transition:all .15s; }
.btn-group:active { transform:scale(.96); }
.btn-group.sel { border-color:var(--primary); background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; }
.g-name { font-size:1rem; font-weight:900; }
.g-prog { font-size:.65rem; opacity:.8; margin-top:4px; }
.prog-mini { height:4px; background:rgba(0,0,0,.08); border-radius:99px; margin-top:6px; overflow:hidden; }
.btn-group.sel .prog-mini { background:rgba(255,255,255,.3); }
.prog-fill { height:100%; background:var(--green); border-radius:99px; }
.btn-group.sel .prog-fill { background:white; }
.mode-row { display:flex; gap:8px; margin:10px 0; }
.m-btn { flex:1; background:white; border:2px solid #E5E7EB; border-radius:12px; padding:10px 4px; cursor:pointer; font-size:.82rem; font-weight:700; color:#555; transition:all .15s; }
.m-btn:active { transform:scale(.95); }
.m-btn.purple { border-color:#8B5CF6; color:#8B5CF6; }
.m-btn.orange { border-color:#F59E0B; color:#F59E0B; }
.parent-note { background:#FFFBEB; border:1px solid #FCD34D; border-radius:12px; padding:10px 12px; font-size:.7rem; color:#777; margin-top:14px; line-height:1.7; }
.reset-btn { display:block; background:none; border:none; color:#ccc; font-size:.72rem; cursor:pointer; margin:10px auto 0; text-align:center; }

/* カード一覧 */
.kana-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.k-card {
  background:white; border:2px solid #E5E7EB; border-radius:12px;
  aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; font-weight:900; cursor:pointer; position:relative;
  transition:all .15s; box-shadow:0 2px 4px rgba(0,0,0,.06);
}
.k-card:active { transform:scale(.92); }
.k-card.done-prac { border-color:#FF6B9D; background:#FFF0F6; color:#FF6B9D; }
.k-card.done-test { border-color:#3B82F6; background:#EFF6FF; color:#3B82F6; }
.k-card.done-both { border-color:#8B5CF6; background:#F5F3FF; color:#8B5CF6; }
.k-badge {
  position:absolute; top:-5px; right:-5px;
  font-size:.55rem; background:#FF6B9D; color:white;
  border-radius:99px; padding:1px 4px; font-weight:700;
}

.game-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.btn-back { background:#eee; border:none; padding:8px 14px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:.85rem; }
.progress-text { font-weight:bold; color:#888; font-size:.9rem; }
.hint-box { text-align:center; margin:6px 0 10px; }
.hint-emoji { font-size:3rem; line-height:1; margin-bottom:6px; }
.hint-word { display:inline-flex; align-items:flex-end; gap:3px; background:white; border-radius:14px; padding:8px 18px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.hint-char  { font-size:2rem; font-weight:700; color:#333; }
.hint-blank { font-size:2rem; font-weight:900; color:var(--primary); border-bottom:3px solid var(--primary); min-width:1.8rem; display:inline-block; text-align:center; }
.msg { text-align:center; font-size:1rem; font-weight:700; min-height:30px; padding:4px; color:var(--green); }

.canvas-container { width:100%; aspect-ratio:1/1; background:white; border:3px dashed #ddd; border-radius:16px; position:relative; touch-action:none; overscroll-behavior:none; }
.canvas-container canvas { width:100%; height:100%; position:absolute; top:0; left:0; cursor:crosshair; }

.btn-row { display:flex; gap:10px; margin-top:12px; }
.btn-next  { flex:2; padding:14px; background:var(--green); color:white; border:none; border-radius:12px; font-size:1.1rem; font-weight:bold; cursor:pointer; box-shadow:0 4px 0 #00A368; }
.btn-next:active  { transform:translateY(4px); box-shadow:none; }
.btn-retry { flex:1; padding:14px; background:white; color:#888; border:2px solid #ddd; border-radius:12px; font-size:.9rem; font-weight:bold; cursor:pointer; }
.btn-anime { flex:1; padding:14px; background:white; color:#3B82F6; border:2px solid #3B82F6; border-radius:12px; font-size:.82rem; font-weight:bold; cursor:pointer; }

.ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; padding:20px; }
.ov.show { display:flex; }
.ov-card { background:white; border-radius:24px; padding:28px 22px; text-align:center; width:100%; max-width:300px; }
.ov-msg  { font-size:1.3rem; font-weight:900; margin-bottom:16px; }
.ov-btns { display:flex; gap:10px; justify-content:center; }
.ob { padding:10px 20px; border-radius:20px; border:none; font-size:.9rem; font-weight:700; cursor:pointer; }
.ob.grn { background:var(--green); color:white; }
.ob.gry { background:#F3F4F6; color:#555; }
.lv-card { background:linear-gradient(135deg,#667eea,#764ba2); color:white; border-radius:24px; padding:28px 22px; text-align:center; width:100%; max-width:300px; }
.rc-card { background:linear-gradient(135deg,#f093fb,#f5576c); color:white; border-radius:24px; padding:28px 22px; text-align:center; width:100%; max-width:300px; }
</style>
</head>
<body>

<!-- タイトル -->
<div id="scr-title" class="screen active">
  <div class="title-logo">✏️ かなマスター</div>
  <div class="title-sub">ひらがな・カタカナ れんしゅう</div>
  <div class="lv-badge">
    <div id="t-mascot" style="font-size:1.8rem">🥚</div>
    <div>
      <div style="font-size:1rem;font-weight:900;color:var(--primary)">Lv.<span id="t-lv">1</span><span id="t-name" style="font-size:.75rem;color:#aaa;font-weight:400"> かなタマゴ</span></div>
      <div class="xp-wrap"><div class="xp-bar" id="t-xpbar" style="width:0%"></div></div>
      <div style="font-size:.65rem;color:#bbb;margin-top:2px">つぎまであと<span id="t-nxp">5</span>こ</div>
    </div>
  </div>
  <div class="sec-label">🌸 ひらがな</div>
  <div class="menu-grid">
    <button class="btn-group" id="gb-h1" onclick="openList('h1')">
      <div class="g-name">あ〜な行</div><div class="g-prog" id="gp-h1">0/25</div>
      <div class="prog-mini"><div class="prog-fill" id="gbar-h1" style="width:0%"></div></div>
    </button>
    <button class="btn-group" id="gb-h2" onclick="openList('h2')">
      <div class="g-name">は〜ん</div><div class="g-prog" id="gp-h2">0/21</div>
      <div class="prog-mini"><div class="prog-fill" id="gbar-h2" style="width:0%"></div></div>
    </button>
  </div>
  <div class="sec-label">🔷 カタカナ</div>
  <div class="menu-grid">
    <button class="btn-group" id="gb-k1" onclick="openList('k1')">
      <div class="g-name">ア〜ナ行</div><div class="g-prog" id="gp-k1">0/25</div>
      <div class="prog-mini"><div class="prog-fill" id="gbar-k1" style="width:0%"></div></div>
    </button>
    <button class="btn-group" id="gb-k2" onclick="openList('k2')">
      <div class="g-name">ハ〜ン</div><div class="g-prog" id="gp-k2">0/21</div>
      <div class="prog-mini"><div class="prog-fill" id="gbar-k2" style="width:0%"></div></div>
    </button>
  </div>
  <div class="mode-row">
    <button class="m-btn purple" onclick="startSpecial('tokkun')">🏅 とっくん</button>
    <button class="m-btn" style="border-color:#00D084;color:#00D084" onclick="startSpecial('nigate')">🐢 にがて</button>
    <button class="m-btn orange" onclick="startRandom()">🎲 ランダム</button>
  </div>
  <div class="parent-note"><strong>⚠️ 保護者・先生方へ</strong><br>本アプリは学習支援のために作成されました。筆順判定はあくまで目安です。正しい書き方は教科書・先生の指導を優先してください。</div>
  <button class="reset-btn" onclick="if(confirm('データをリセットしますか？'))doReset()">🗑 データをリセット</button>
</div>

<!-- カード一覧画面 -->
<div id="scr-list" class="screen">
  <div class="game-header">
    <button class="btn-back" onclick="showScreen('scr-title')">← もどる</button>
    <div class="progress-text" id="list-title">あ〜な行</div>
  </div>
  <div class="mode-row" style="margin-bottom:12px">
    <button class="m-btn" id="lb-prac" onclick="listSetMode('practice')">✏️ れんしゅう</button>
    <button class="m-btn" id="lb-test" onclick="listSetMode('test')">🎯 テスト</button>
  </div>
  <div id="kana-grid" class="kana-grid"></div>
  <div class="mode-row" style="margin-top:12px">
    <button class="btn-next" onclick="startAll()">ぜんぶ やる →</button>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="scr-game" class="screen">
  <div class="game-header">
    <button class="btn-back" onclick="goBack()">← もどる</button>
    <div class="progress-text" id="prog-text">1 / 25</div>
  </div>
  <div class="hint-box" id="hint-box"></div>
  <div class="msg" id="msg">うすいせんを なぞろう！</div>
  <div class="canvas-container" id="canvas-container">
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-fx"></canvas>
    <canvas id="canvas-dr"></canvas>
  </div>
  <div class="btn-row">
    <button class="btn-anime" onclick="doAnime()">▶ じゅん</button>
    <button class="btn-retry" onclick="doRetry()">↺ やりなおし</button>
    <button class="btn-next"  onclick="doNext()">つぎへ →</button>
  </div>
</div>

<!-- 正解 -->
<div class="ov" id="ov-ok">
  <div class="ov-card">
    <div style="font-size:2.8rem;margin-bottom:6px" id="ov-icon">⭐</div>
    <div class="ov-msg" id="ov-msg">できたー！</div>
    <div class="ov-btns">
      <button class="ob grn" onclick="closeOvNext()">つぎへ →</button>
      <button class="ob gry" onclick="closeOvRetry()">もういっかい</button>
    </div>
  </div>
</div>
<!-- レベルアップ -->
<div class="ov" id="ov-lv">
  <div class="lv-card">
    <div style="font-size:1.2rem;font-weight:900;margin-bottom:4px">✨ レベルアップ！</div>
    <div style="font-size:2.5rem;margin:6px 0" id="lv-mascot">🐣</div>
    <div style="font-size:2rem;font-weight:900">Lv.<span id="lv-num">2</span></div>
    <div style="margin:8px 0;font-size:.9rem;opacity:.9">すごいぞ！もっと強くなったね！</div>
    <button class="ob" style="background:white;color:#764ba2;margin-top:8px" onclick="closeLv()">やったー！🎉</button>
  </div>
</div>
<!-- ランダム完了 -->
<div class="ov" id="ov-rc">
  <div class="rc-card">
    <div style="font-size:2rem;margin-bottom:6px">🎉</div>
    <div style="font-size:1.3rem;font-weight:900;margin-bottom:4px">テストクリア！</div>
    <div style="font-size:.85rem;opacity:.9;margin-bottom:14px">ボーナス +10XP ゲット！</div>
    <button class="ob" style="background:white;color:#f5576c" onclick="closeRc()">🏠 ホームへ</button>
  </div>
</div>

<script>
'use strict';

// ============================================================
// 単語データ
// ============================================================
const KANA_WORDS = {
  h1:[
    {char:'あ',emoji:'🌧️',word:'あめ',pos:0},{char:'い',emoji:'🐶',word:'いぬ',pos:0},
    {char:'う',emoji:'🐴',word:'うま',pos:0},{char:'え',emoji:'📖',word:'えほん',pos:0},
    {char:'お',emoji:'🍙',word:'おにぎり',pos:0},{char:'か',emoji:'🐸',word:'かえる',pos:0},
    {char:'き',emoji:'🍄',word:'きのこ',pos:0},{char:'く',emoji:'🐻',word:'くま',pos:0},
    {char:'け',emoji:'🐛',word:'けむし',pos:0},{char:'こ',emoji:'🐨',word:'こあら',pos:0},
    {char:'さ',emoji:'🐟',word:'さかな',pos:0},{char:'し',emoji:'🦌',word:'しか',pos:0},
    {char:'す',emoji:'🍉',word:'すいか',pos:0},{char:'せ',emoji:'🐞',word:'せみ',pos:0},
    {char:'そ',emoji:'🌌',word:'そら',pos:0},{char:'た',emoji:'🥚',word:'たまご',pos:0},
    {char:'ち',emoji:'🦋',word:'ちょう',pos:0},{char:'つ',emoji:'🌙',word:'つき',pos:0},
    {char:'て',emoji:'🧤',word:'てぶくろ',pos:0},{char:'と',emoji:'🐯',word:'とら',pos:0},
    {char:'な',emoji:'🍐',word:'なし',pos:0},{char:'に',emoji:'🌈',word:'にじ',pos:0},
    {char:'ぬ',emoji:'🧵',word:'ぬの',pos:0},{char:'ね',emoji:'🐈',word:'ねこ',pos:0},
    {char:'の',emoji:'🍙',word:'のり',pos:0},
  ],
  h2:[
    {char:'は',emoji:'🌸',word:'はな',pos:0},{char:'ひ',emoji:'🐤',word:'ひよこ',pos:0},
    {char:'ふ',emoji:'🚢',word:'ふね',pos:0},{char:'へ',emoji:'🐍',word:'へび',pos:0},
    {char:'ほ',emoji:'⭐',word:'ほし',pos:0},{char:'ま',emoji:'🐟',word:'まぐろ',pos:0},
    {char:'み',emoji:'👂',word:'みみ',pos:0},{char:'む',emoji:'🐛',word:'むし',pos:0},
    {char:'め',emoji:'👓',word:'めがね',pos:0},{char:'も',emoji:'🍑',word:'もも',pos:0},
    {char:'や',emoji:'🏔️',word:'やま',pos:0},{char:'ゆ',emoji:'⛄️',word:'ゆき',pos:0},
    {char:'よ',emoji:'🌙',word:'よる',pos:0},{char:'ら',emoji:'🦁',word:'らいおん',pos:0},
    {char:'り',emoji:'🍎',word:'りんご',pos:0},{char:'る',emoji:'🏠',word:'るすばん',pos:0},
    {char:'れ',emoji:'🍋',word:'れもん',pos:0},{char:'ろ',emoji:'🤖',word:'ろぼっと',pos:0},
    {char:'わ',emoji:'🐊',word:'わに',pos:0},{char:'を',emoji:'🌌',word:'そらを',pos:2},
    {char:'ん',emoji:'🍎',word:'りんご',pos:1},
  ],
  k1:[
    {char:'ア',emoji:'🍦',word:'アイス',pos:0},{char:'イ',emoji:'🌭',word:'インク',pos:0},
    {char:'ウ',emoji:'🌭',word:'ウインナー',pos:0},{char:'エ',emoji:'🏢',word:'エレベーター',pos:0},
    {char:'オ',emoji:'🍳',word:'オムライス',pos:0},{char:'カ',emoji:'📷',word:'カメラ',pos:0},
    {char:'キ',emoji:'🥝',word:'キウイ',pos:0},{char:'ク',emoji:'🍪',word:'クッキー',pos:0},
    {char:'ケ',emoji:'🍰',word:'ケーキ',pos:0},{char:'コ',emoji:'☕',word:'コーヒー',pos:0},
    {char:'サ',emoji:'🥗',word:'サラダ',pos:0},{char:'シ',emoji:'🚿',word:'シャワー',pos:0},
    {char:'ス',emoji:'📱',word:'スマホ',pos:0},{char:'セ',emoji:'🧴',word:'セッケン',pos:0},
    {char:'ソ',emoji:'🛋️',word:'ソファ',pos:0},{char:'タ',emoji:'🚕',word:'タクシー',pos:0},
    {char:'チ',emoji:'🧀',word:'チーズ',pos:0},{char:'ツ',emoji:'🎄',word:'ツリー',pos:0},
    {char:'テ',emoji:'📺',word:'テレビ',pos:0},{char:'ト',emoji:'🍅',word:'トマト',pos:0},
    {char:'ナ',emoji:'🔪',word:'ナイフ',pos:0},{char:'ニ',emoji:'📰',word:'ニュース',pos:0},
    {char:'ヌ',emoji:'🐃',word:'ヌー',pos:0},{char:'ネ',emoji:'👔',word:'ネクタイ',pos:0},
    {char:'ノ',emoji:'📓',word:'ノート',pos:0},
  ],
  k2:[
    {char:'ハ',emoji:'🍽️',word:'ハンバーグ',pos:0},{char:'ヒ',emoji:'🦸',word:'ヒーロー',pos:0},
    {char:'フ',emoji:'🍴',word:'フォーク',pos:0},{char:'ヘ',emoji:'🚁',word:'ヘリコプター',pos:0},
    {char:'ホ',emoji:'⭐',word:'ホシ',pos:0},{char:'マ',emoji:'🎤',word:'マイク',pos:0},
    {char:'ミ',emoji:'🥛',word:'ミルク',pos:0},{char:'ム',emoji:'🍮',word:'ムース',pos:0},
    {char:'メ',emoji:'🍈',word:'メロン',pos:0},{char:'モ',emoji:'👾',word:'モンスター',pos:0},
    {char:'ヤ',emoji:'🌴',word:'ヤシ',pos:0},{char:'ユ',emoji:'👕',word:'ユニフォーム',pos:0},
    {char:'ヨ',emoji:'⛵',word:'ヨット',pos:0},{char:'ラ',emoji:'🦁',word:'ライオン',pos:0},
    {char:'リ',emoji:'🎀',word:'リボン',pos:0},{char:'ル',emoji:'💎',word:'ルビー',pos:0},
    {char:'レ',emoji:'🍋',word:'レモン',pos:0},{char:'ロ',emoji:'🤖',word:'ロボット',pos:0},
    {char:'ワ',emoji:'🧇',word:'ワッフル',pos:0},{char:'ヲ',emoji:'🍰',word:'ケーキヲ',pos:3},
    {char:'ン',emoji:'🍞',word:'パン',pos:1},
  ],
};

const GROUPS = {h1:{total:25},h2:{total:21},k1:{total:25},k2:{total:21}};
const TITLES = [
  {lv:1,m:'🥚',t:'かなタマゴ'},{lv:3,m:'🐣',t:'かなのひよこ'},
  {lv:5,m:'🐥',t:'かなのとり'},{lv:8,m:'🐦',t:'かなのつばめ'},
  {lv:12,m:'🦅',t:'かなのわし'},{lv:18,m:'🌟',t:'かなのほし'},
  {lv:25,m:'👑',t:'かなマスター！'},
];
function getTitle(lv){let r=TITLES[0];for(const t of TITLES){if(lv>=t.lv)r=t;else break;}return r;}

// ============================================================
// 状態・保存
// ============================================================
let cleared = JSON.parse(localStorage.getItem('km_cleared'))||{};
let tokk    = JSON.parse(localStorage.getItem('km_tokk'))   ||{};
let niga    = JSON.parse(localStorage.getItem('km_niga'))   ||{};
let bonXP   = parseInt(localStorage.getItem('km_bonxp'))    ||0;
let mistCnt = JSON.parse(localStorage.getItem('km_mist'))   ||{};

function save(){
  localStorage.setItem('km_cleared',JSON.stringify(cleared));
  localStorage.setItem('km_tokk',   JSON.stringify(tokk));
  localStorage.setItem('km_niga',   JSON.stringify(niga));
  localStorage.setItem('km_bonxp',  bonXP);
  localStorage.setItem('km_mist',   JSON.stringify(mistCnt));
}

function getXP(){
  const x=Object.keys(cleared).length+bonXP;
  return{lv:Math.floor(x/5)+1, cur:x%5, next:5-(x%5)};
}

function updateTitle(){
  const{lv,cur,next}=getXP();
  const ti=getTitle(lv);
  document.getElementById('t-mascot').textContent=ti.m;
  document.getElementById('t-lv').textContent=lv;
  document.getElementById('t-name').textContent=' '+ti.t;
  document.getElementById('t-nxp').textContent=next;
  document.getElementById('t-xpbar').style.width=`${(cur/5)*100}%`;
  for(const g of Object.keys(GROUPS)){
    const total=GROUPS[g].total;
    const done=KANA_WORDS[g].filter(w=>cleared[w.char]).length;
    document.getElementById(`gp-${g}`).textContent=`${done}/${total}`;
    document.getElementById(`gbar-${g}`).style.width=`${Math.round(done/total*100)}%`;
  }
  updateGroupSel();
}

let curGroup='h1';
function selGroup(g){snd('click');curGroup=g;updateGroupSel();}
function updateGroupSel(){
  for(const g of Object.keys(GROUPS))
    document.getElementById(`gb-${g}`).classList.toggle('sel',g===curGroup);
}

// カード一覧
let listMode='practice';

function openList(g){
  snd('click'); curGroup=g;
  const labels={h1:'あ〜な行',h2:'は〜ん',k1:'ア〜ナ行',k2:'ハ〜ン'};
  document.getElementById('list-title').textContent=labels[g];
  listMode='practice'; updateListModeBtns();
  renderKanaGrid();
  showScreen('scr-list');
}

function listSetMode(m){
  snd('click'); listMode=m;
  updateListModeBtns(); renderKanaGrid();
}

function updateListModeBtns(){
  document.getElementById('lb-prac').style.borderColor=listMode==='practice'?'var(--primary)':'#E5E7EB';
  document.getElementById('lb-prac').style.color      =listMode==='practice'?'var(--primary)':'#555';
  document.getElementById('lb-test').style.borderColor=listMode==='test'?'#3B82F6':'#E5E7EB';
  document.getElementById('lb-test').style.color      =listMode==='test'?'#3B82F6':'#555';
}

function renderKanaGrid(){
  const grid=document.getElementById('kana-grid');
  grid.innerHTML='';
  KANA_WORDS[curGroup].forEach(w=>{
    const hasPrac=!!localStorage.getItem('km_prac_'+w.char);
    const hasTest=!!localStorage.getItem('km_test_'+w.char);
    const card=document.createElement('div');
    card.className='k-card';
    if(hasPrac&&hasTest) card.classList.add('done-both');
    else if(hasPrac)     card.classList.add('done-prac');
    else if(hasTest)     card.classList.add('done-test');
    // クリア済みバッジ
    if(cleared[w.char]){
      const b=document.createElement('div');
      b.className='k-badge'; b.textContent='✓'; card.appendChild(b);
    }
    const t=document.createTextNode(w.char);
    card.appendChild(t);
    card.onclick=()=>{
      snd('click'); curMode=listMode;
      queue=[w]; qIdx=0; isRandom=false;
      showScreen('scr-game'); loadQ();
    };
    grid.appendChild(card);
  });
}

function startAll(){
  snd('click'); curMode=listMode;
  queue=[...KANA_WORDS[curGroup]]; qIdx=0; isRandom=false;
  showScreen('scr-game'); loadQ();
}

function startSpecial(m){
  snd('click'); curMode=m;
  let list=[];
  if(m==='tokkun') list=Object.keys(GROUPS).flatMap(g=>KANA_WORDS[g].filter(w=>tokk[w.char]));
  if(m==='nigate') list=Object.keys(GROUPS).flatMap(g=>KANA_WORDS[g].filter(w=>niga[w.char]));
  if(!list.length){alert('もじが ありません');return;}
  queue=list; qIdx=0; isRandom=false;
  showScreen('scr-game'); loadQ();
}

// ============================================================
// ゲーム管理
// ============================================================
let queue=[],qIdx=0,curQ=null,curMode='practice',isRandom=false,rLvBefore=1;

function startRandom(){
  snd('click'); curMode='test'; isRandom=true; rLvBefore=getXP().lv;
  queue=[...KANA_WORDS[curGroup]].sort(()=>Math.random()-.5).slice(0,10);
  qIdx=0; showScreen('scr-game'); loadQ();
}

function showScreen(id){
  window.scrollTo(0,0);
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='scr-title') updateTitle();
}
function goTitle(){animating=false; showScreen('scr-title');}
function goBack(){
  animating=false;
  // とっくん・にがて・ランダムはタイトルへ、それ以外はカード一覧へ
  if(isRandom||curMode==='tokkun'||curMode==='nigate') showScreen('scr-title');
  else{ renderKanaGrid(); showScreen('scr-list'); }
}

// ============================================================
// 問題読み込み
// ============================================================
async function loadQ(){
  curQ=queue[qIdx];
  document.getElementById('prog-text').textContent=`${qIdx+1} / ${queue.length}`;
  const isTest=(curMode==='test');
  const hintEl=document.getElementById('hint-box');
  if(isTest){
    const wHTML=[...curQ.word].map((c,i)=>
      i===curQ.pos ? `<span class="hint-blank">＿</span>` : `<span class="hint-char">${c}</span>`
    ).join('');
    hintEl.innerHTML=`<div class="hint-emoji">${curQ.emoji}</div><div class="hint-word">${wHTML}</div>`;
  }else{
    hintEl.innerHTML='';
  }
  const msg=document.getElementById('msg');
  msg.textContent=isTest?'ぬけてるもじをかいてね。':'うすいせんを なぞろう！';
  msg.style.color=isTest?'#FF6B9D':'#00D084';

  initCanvas();

  // KanjiVG 1本で薄い字描画＋判定用パス取得を同時に行う
  await loadKanjiVG(curQ.char);
}

// ============================================================
// Canvas初期化（offsetWidthでサイズ取得）
// ============================================================
let ctxBg,ctxFx,ctxDr,cW=0;
let strokes=[],currentStroke=0;         // KanjiVGのpathd文字列配列
let drawing=false,animating=false;
let drawLength=0,lastX=null,lastY=null; // 描画距離管理
const TOLERANCE_RATIO=0.10;             // canvas幅に対する割合（固定px→比率に）

function initCanvas(){
  const cont=document.getElementById('canvas-container');
  const size=cont.offsetWidth;
  cW=size;
  ['canvas-bg','canvas-fx','canvas-dr'].forEach(id=>{
    const c=document.getElementById(id);
    c.width=size; c.height=size;
  });
  ctxBg=document.getElementById('canvas-bg').getContext('2d');
  ctxFx=document.getElementById('canvas-fx').getContext('2d');
  ctxDr=document.getElementById('canvas-dr').getContext('2d');

  // グリッド線
  ctxBg.strokeStyle='#E8F4FD'; ctxBg.lineWidth=1.5; ctxBg.setLineDash([5,5]);
  ctxBg.beginPath();
  ctxBg.moveTo(cW/2,0); ctxBg.lineTo(cW/2,cW);
  ctxBg.moveTo(0,cW/2); ctxBg.lineTo(cW,cW/2);
  ctxBg.stroke(); ctxBg.setLineDash([]);

  strokes=[]; currentStroke=0;
  drawing=false; animating=false;
  drawLength=0; lastX=null; lastY=null;

  const drC=document.getElementById('canvas-dr');
  drC.onpointerdown=e=>{
    if(animating||currentStroke>=strokes.length)return;
    const{x,y}=getXY(e,drC);
    if(!checkStart(x,y))return; // 始点が外れていたら無視
    drawing=true; drawLength=0; lastX=x; lastY=y;
    ctxDr.beginPath(); ctxDr.moveTo(x,y);
  };
  drC.onpointermove=e=>{
    if(!drawing)return; e.preventDefault();
    const{x,y}=getXY(e,drC);
    trackDraw(x,y);
    ctxDr.lineTo(x,y);
    ctxDr.lineCap='round'; ctxDr.lineJoin='round';
    ctxDr.lineWidth=cW*0.07; ctxDr.strokeStyle='rgba(56,189,248,0.8)';
    ctxDr.stroke();
  };
  drC.onpointerup=e=>{
    if(!drawing)return; drawing=false;
    const{x,y}=getXY(e,drC);
    trackDraw(x,y);
    evalEnd(x,y);
  };
  drC.onpointerleave=e=>{
    if(!drawing)return; drawing=false;
    evalEnd(lastX??0,lastY??0);
  };
}

function getXY(e,canvas){
  const r=canvas.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-r.left)*(cW/r.width), y:(cy-r.top)*(cW/r.height)};
}

// ============================================================
// KanjiVG：薄い字描画 ＋ 判定用パス取得（1本で完結）
// ============================================================
const svgCache={};

async function loadKanjiVG(char){
  const isPrac=(curMode==='practice'||curMode==='tokkun'||curMode==='nigate');
  try{
    const hex=char.codePointAt(0).toString(16);
    const url=`https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${hex}.svg`;

    let svgText=svgCache[hex];
    if(!svgText){
      const res=await fetch(url);
      if(!res.ok) throw new Error('not found');
      svgText=await res.text();
      svgCache[hex]=svgText;
    }

    // ① 判定用パスをDOMParserで取得（あなたのfetchKanjiVGと同じ方式）
    const parser=new DOMParser();
    const doc=parser.parseFromString(svgText,'image/svg+xml');
    strokes=[...doc.querySelectorAll('path')].map(p=>p.getAttribute('d'));
    currentStroke=0; drawLength=0; lastX=null; lastY=null;

    // ② 薄い字をSVG Blob→Imageで描画（れんしゅうモードのみ）
    if(isPrac){
      let styled=svgText.replace('</svg>',`<style>
        path { stroke:#E2E8F0 !important; stroke-width:6 !important; fill:none !important; }
        text { fill:#94A3B8 !important; font-size:8px !important; font-family:sans-serif; }
      </style></svg>`);
      const blob=new Blob([styled],{type:'image/svg+xml;charset=utf-8'});
      const blobUrl=URL.createObjectURL(blob);
      await new Promise(resolve=>{
        const img=new Image();
        img.onload=()=>{
          // グリッド線を再描画してからSVGを重ねる
          ctxBg.clearRect(0,0,cW,cW);
          ctxBg.strokeStyle='#E8F4FD'; ctxBg.lineWidth=1.5; ctxBg.setLineDash([5,5]);
          ctxBg.beginPath();
          ctxBg.moveTo(cW/2,0); ctxBg.lineTo(cW/2,cW);
          ctxBg.moveTo(0,cW/2); ctxBg.lineTo(cW,cW/2);
          ctxBg.stroke(); ctxBg.setLineDash([]);
          ctxBg.drawImage(img,0,0,cW,cW);
          URL.revokeObjectURL(blobUrl);
          resolve();
        };
        img.onerror=()=>{URL.revokeObjectURL(blobUrl); resolve();};
        img.src=blobUrl;
      });
    }
  }catch(e){
    console.warn(`「${char}」のKanjiVGデータがありません`);
    strokes=[]; currentStroke=0;
  }
}

// ============================================================
// 判定：あなたのcheckStart / draw / checkEnd をそのまま実装
// ============================================================

// KanjiVGのSVGパスは109×109のviewBoxで定義されている
// getTotalLength/getPointAtLengthはDOMに追加しないと
// Safariなど一部ブラウザで0を返すバグがある → 一時的にDOMに追加して取得
const _svgMeasure=(()=>{
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.style.cssText='position:absolute;visibility:hidden;width:0;height:0';
  document.body.appendChild(svg);
  return svg;
})();

function getScaledEndPoints(pathStr){
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',pathStr);
  _svgMeasure.appendChild(path);          // ← DOMに追加してから計測
  const len=path.getTotalLength();
  const s=path.getPointAtLength(0);
  const e=path.getPointAtLength(len);
  _svgMeasure.removeChild(path);          // ← 計測後に削除
  const sc=cW/109;
  return{
    start:{x:s.x*sc, y:s.y*sc},
    end:  {x:e.x*sc, y:e.y*sc},
    len:  len*sc
  };
}

function checkStart(x,y){
  if(!strokes.length||currentStroke>=strokes.length)return false;
  const{start}=getScaledEndPoints(strokes[currentStroke]);
  const THR=cW*TOLERANCE_RATIO;
  return Math.hypot(x-start.x, y-start.y)<THR;
}

function trackDraw(x,y){
  if(lastX!==null) drawLength+=Math.hypot(x-lastX, y-lastY);
  lastX=x; lastY=y;
}

function evalEnd(x,y){
  if(!strokes.length||currentStroke>=strokes.length)return;
  const{end,len}=getScaledEndPoints(strokes[currentStroke]);
  const THR=cW*TOLERANCE_RATIO;
  const dE=Math.hypot(x-end.x, y-end.y);
  ctxDr.clearRect(0,0,cW,cW);

  if(dE<THR && drawLength>len*0.4){
    // 正解
    snd('stroke');
    currentStroke++;
    drawLength=0; lastX=null; lastY=null;
    redrawFx();
    setMsg('いいぞ！ その調子！','#00D084');
    if(currentStroke>=strokes.length) onComplete();
  }else{
    // 不正解
    snd('error');
    drawLength=0; lastX=null; lastY=null;
    const ch=curQ.char;
    mistCnt[ch]=(mistCnt[ch]||0)+1; save();
    if(mistCnt[ch]>=3&&!niga[ch]){
      niga[ch]=true; save();
      setMsg('おしい！ にがてに とうろくしたよ🐢','#EF4444');
    }else{
      setMsg('おしい！ ここを みてね！','#EF4444');
    }
    showHint(currentStroke);
  }
}

function setMsg(t,c){
  const el=document.getElementById('msg');
  el.textContent=t; el.style.color=c;
}

// 書き終えた画をfxCanvasにstrokeで再描画
function redrawFx(){
  ctxFx.clearRect(0,0,cW,cW);
  if(!strokes.length)return;
  const sc=cW/109;
  ctxFx.save(); ctxFx.scale(sc,sc);
  ctxFx.strokeStyle='#222'; ctxFx.lineWidth=3/sc;
  ctxFx.lineCap='round'; ctxFx.lineJoin='round';
  for(let i=0;i<currentStroke;i++){
    ctxFx.beginPath();
    ctxFx.stroke(new Path2D(strokes[i]));
  }
  ctxFx.restore();
}

// 次の画をヒント表示（赤でflash）
function showHint(idx){
  if(idx>=strokes.length)return;
  const sc=cW/109;
  ctxFx.save(); ctxFx.scale(sc,sc);
  ctxFx.strokeStyle='rgba(255,80,80,0.55)'; ctxFx.lineWidth=4/sc;
  ctxFx.lineCap='round'; ctxFx.lineJoin='round';
  ctxFx.beginPath(); ctxFx.stroke(new Path2D(strokes[idx]));
  ctxFx.restore();
  setTimeout(()=>redrawFx(),1000);
}

// ============================================================
// アニメーション（画ごとにハイライト）
// ============================================================
async function doAnime(){
  if(animating||!strokes.length)return;
  animating=true; currentStroke=0;
  ctxFx.clearRect(0,0,cW,cW); ctxDr.clearRect(0,0,cW,cW);
  const sc=cW/109;
  for(let i=0;i<strokes.length;i++){
    if(!animating)break;
    ctxFx.clearRect(0,0,cW,cW);
    ctxFx.save(); ctxFx.scale(sc,sc);
    // 描き終わった画を黒で
    ctxFx.strokeStyle='#222'; ctxFx.lineWidth=3/sc;
    ctxFx.lineCap='round'; ctxFx.lineJoin='round';
    for(let j=0;j<i;j++){ctxFx.beginPath(); ctxFx.stroke(new Path2D(strokes[j]));}
    // 今の画をハイライト
    ctxFx.strokeStyle='#38BDF8'; ctxFx.lineWidth=4/sc;
    ctxFx.beginPath(); ctxFx.stroke(new Path2D(strokes[i]));
    ctxFx.restore();
    await new Promise(r=>setTimeout(r,500));
  }
  // 全部黒で仕上げ
  ctxFx.clearRect(0,0,cW,cW);
  ctxFx.save(); ctxFx.scale(sc,sc);
  ctxFx.strokeStyle='#222'; ctxFx.lineWidth=3/sc;
  ctxFx.lineCap='round'; ctxFx.lineJoin='round';
  strokes.forEach(d=>{ctxFx.beginPath(); ctxFx.stroke(new Path2D(d));});
  ctxFx.restore();
  animating=false; doRetry();
}

// ============================================================
// 完了・次へ
// ============================================================
function onComplete(){
  snd('complete');
  const oldLv=getXP().lv;
  cleared[curQ.char]=true; save();
  const newLv=getXP().lv;
  document.getElementById('ov-icon').textContent=curMode==='practice'?'⭐':'🎊';
  document.getElementById('ov-msg').textContent=curMode==='practice'?'できたー！':'だいせいかい！';
  setTimeout(()=>{
    showOv('ov-ok');
    if(newLv>oldLv){
      setTimeout(()=>{
        closeOv('ov-ok');
        document.getElementById('lv-mascot').textContent=getTitle(newLv).m;
        document.getElementById('lv-num').textContent=newLv;
        showOv('ov-lv');
      },600);
    }
  },500);
}

function doNext(){
  qIdx++;
  if(qIdx<queue.length) loadQ();
  else{
    if(isRandom){bonXP+=10; save(); showOv('ov-rc');}
    else{snd('levelup'); alert('ぜんぶ おわったよ！🌸'); goTitle();}
  }
}

function doRetry(){
  currentStroke=0; drawing=false;
  drawLength=0; lastX=null; lastY=null;
  ctxFx.clearRect(0,0,cW,cW); ctxDr.clearRect(0,0,cW,cW);
  const isTest=(curMode==='test');
  setMsg(isTest?'ぬけてるもじをかいてね。':'うすいせんを なぞろう！', isTest?'#FF6B9D':'#00D084');
}

function closeOvNext() {closeOv('ov-ok'); doNext();}
function closeOvRetry(){closeOv('ov-ok'); doRetry();}
function closeLv(){closeOv('ov-lv'); doNext();}
function closeRc(){closeOv('ov-rc'); goTitle();}
function showOv(id){document.getElementById(id).classList.add('show');}
function closeOv(id){document.getElementById(id).classList.remove('show');}

function doReset(){
  localStorage.clear();
  cleared={}; tokk={}; niga={}; bonXP=0; mistCnt={};
  updateTitle();
}

// ============================================================
// 効果音
// ============================================================
let AC;
function snd(t){
  try{
    if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    const now=AC.currentTime;
    const o=(f,w,d,v=0.1,s=now)=>{
      const os=AC.createOscillator(),g=AC.createGain();
      os.type=w; os.frequency.setValueAtTime(f,s);
      g.gain.setValueAtTime(v,s); g.gain.exponentialRampToValueAtTime(.01,s+d);
      os.connect(g); g.connect(AC.destination); os.start(s); os.stop(s+d);
    };
    if(t==='stroke') o(700,'sine',.12,.2);
    else if(t==='error') o(200,'sawtooth',.25,.15);
    else if(t==='click') o(500,'triangle',.1,.08);
    else if(t==='complete'){o(600,'sine',.15,.15); setTimeout(()=>o(900,'sine',.25,.15),120);}
    else if(t==='levelup') [[0,523,.12],[.1,659,.12],[.2,784,.12],[.3,1047,.35]].forEach(([off,f,d])=>o(f,'triangle',d,.2,now+off));
  }catch(e){}
}

// 起動
updateTitle();
</script>
